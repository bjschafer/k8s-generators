[tools]
bun = "latest"
kubectl = "1.36"
helm = "3.21.3"
# Renders the velero CRDs (`velero install --crds-only`), so the CLI version IS
# the CRD version -- unlike helm above, which only pulls a chart at a version
# passed to it. tools/sources.ts pins the same version and hard-fails if the
# installed CLI disagrees, so these two must be bumped together; renovate.json
# groups them into one PR to keep that true.
velero = "1.18.2"
promtool = "latest"
pint = "latest"
"aqua:prometheus/alertmanager" = "latest"
bitwarden-secrets-manager = "latest"
# vlogscli ships bundled with vlagent inside the `vlutils` release archive;
# pin the exe + asset so the github backend extracts the right binary.
"github:VictoriaMetrics/VictoriaLogs[exe=vlogscli-prod,matching=vlutils]" = "latest"

[env]
# Derived from the pinned kubectl above so helm template uses the right .Capabilities.KubeVersion
KUBE_VERSION = { value = "v{{ tools.kubectl.version }}", tools = true }


[tasks.clean-full]
description = "Remove all generated files"
depends = ["clean"]
run = """
#!/usr/bin/env bash
set -euo pipefail
rm -rf apps/**/*.js apps/**/*.d.ts
rm -rf lib/*.js lib/*.d.ts lib/**/*.js lib/**/*.d.ts
rm -rf imports/*.js imports/*.d.ts
"""

[tasks.install]
description = "Install dependencies"
run = "bun install --frozen-lockfile"

[tasks.upgrade]
description = "Upgrade dependencies"
run = "bun update"

[tasks.format]
description = "Alias for fmt"
depends = ["fmt"]

[tasks.fmt]
description = "Format TypeScript files"
depends = ["install"]
run = 'bun x oxfmt --write "**/*.ts"'

[tasks.lint]
description = "Lint TypeScript files"
depends = ["install"]
run = 'bun x oxlint apps/ lib/ tools/'

[tasks.typecheck]
description = "Type-check TypeScript files"
depends = ["install"]
run = "bun x tsc --noEmit"

[tasks.check]
description = "Format, lint, validate alerts, and typecheck"
depends = ["fmt", "lint", "validate-alerts", "typecheck"]

[tasks.schemas]
description = "Generate TypeScript types from JSON schemas"
run = 'bun x json2ts -i schemas/ -o imports/helm-values/'
