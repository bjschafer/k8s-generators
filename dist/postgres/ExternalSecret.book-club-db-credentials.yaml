apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: book-club-db-credentials
  namespace: postgres
spec:
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: book-club-pg-password-generator
  refreshInterval: "0"
  target:
    name: book-club-db-credentials
    template:
      data:
        password: "{{ .password }}"
        username: book-club
      metadata:
        labels:
          cnpg.io/reload: "true"
      type: kubernetes.io/basic-auth
