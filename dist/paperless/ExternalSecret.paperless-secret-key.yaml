apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-secret-key
  namespace: paperless
spec:
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: paperless-secret-key-generator
  refreshInterval: "0"
  target:
    name: paperless-secret-key
