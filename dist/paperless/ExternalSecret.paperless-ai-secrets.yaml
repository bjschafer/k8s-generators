apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-ai-secrets
  namespace: paperless
spec:
  data:
    - remoteRef:
        key: PLACEHOLDER-paperless-api-token
      secretKey: PAPERLESS_API_TOKEN
    - remoteRef:
        key: PLACEHOLDER-cloudflare-workers-ai-key
      secretKey: CUSTOM_API_KEY
    - remoteRef:
        key: PLACEHOLDER-paperless-ai-web-api-key
      secretKey: API_KEY
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: paperless-ai-secrets
