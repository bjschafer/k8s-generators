apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: statsd.cmdcentral.xyz
  name: statsd-exporter-lb
  namespace: metrics-exporters
spec:
  externalIPs: []
  ports:
    - name: statsd
      port: 9125
      protocol: UDP
  selector:
    app.kubernetes.io/name: statsd-exporter
  type: LoadBalancer
