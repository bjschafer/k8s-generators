data:
  ceph-perf-drilldown.json: "{\"panels\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Cluster-wide OSD write operations per second. Baseline ~200, spike threshold ~400.\",\"fieldConfig\":{\"defaults\":{\"thresholds\":{\"mode\":\"absolute\",\"steps\":[{\"color\":\"green\",\"value\":null},{\"color\":\"yellow\",\"value\":300},{\"color\":\"red\",\"value\":450}]},\"unit\":\"ops\"},\"overrides\":[]},\"gridPos\":{\"h\":4,\"w\":8,\"x\":0,\"y\":0},\"id\":1,\"options\":{\"colorMode\":\"background\",\"graphMode\":\"area\",\"reduceOptions\":{\"calcs\":[\"lastNotNull\"]},\"textMode\":\"auto\"},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"sum(rate(ceph_osd_op_w[5m]))\",\"legendFormat\":\"Write Ops/s\",\"refId\":\"A\"}],\"title\":\"Total Write Ops/s\",\"type\":\"stat\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Cluster-wide OSD write throughput. Baseline ~800 KB/s, spike peak ~3.9 MB/s.\",\"fieldConfig\":{\"defaults\":{\"thresholds\":{\"mode\":\"absolute\",\"steps\":[{\"color\":\"green\",\"value\":null},{\"color\":\"yellow\",\"value\":1500000},{\"color\":\"red\",\"value\":3000000}]},\"unit\":\"Bps\"},\"overrides\":[]},\"gridPos\":{\"h\":4,\"w\":8,\"x\":8,\"y\":0},\"id\":2,\"options\":{\"colorMode\":\"background\",\"graphMode\":\"area\",\"reduceOptions\":{\"calcs\":[\"lastNotNull\"]},\"textMode\":\"auto\"},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"sum(rate(ceph_osd_op_w_in_bytes[5m]))\",\"legendFormat\":\"Write Bytes/s\",\"refId\":\"A\"}],\"title\":\"Total Write Throughput\",\"type\":\"stat\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Average OSD write commit latency across all OSDs.\",\"fieldConfig\":{\"defaults\":{\"thresholds\":{\"mode\":\"absolute\",\"steps\":[{\"color\":\"green\",\"value\":null},{\"color\":\"yellow\",\"value\":10},{\"color\":\"red\",\"value\":50}]},\"unit\":\"ms\"},\"overrides\":[]},\"gridPos\":{\"h\":4,\"w\":8,\"x\":16,\"y\":0},\"id\":3,\"options\":{\"colorMode\":\"background\",\"graphMode\":\"area\",\"reduceOptions\":{\"calcs\":[\"lastNotNull\"]},\"textMode\":\"auto\"},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"avg(ceph_osd_commit_latency_ms)\",\"legendFormat\":\"Commit Latency\",\"refId\":\"A\"}],\"title\":\"Avg Write Commit Latency\",\"type\":\"stat\"},{\"collapsed\":false,\"gridPos\":{\"h\":1,\"w\":24,\"x\":0,\"y\":4},\"id\":4,\"title\":\"Write Activity by Host\",\"type\":\"row\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Write ops per second, summed by Proxmox host using OSD metadata. Imbalance here points to VMs or CTs on one host generating disproportionate I/O.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":15,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false,\"stacking\":{\"group\":\"A\",\"mode\":\"none\"}},\"unit\":\"ops\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":0,\"y\":5},\"id\":5,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"sum by(hostname) (rate(ceph_osd_op_w[5m]) * on(ceph_daemon) group_left(hostname) ceph_osd_metadata)\",\"legendFormat\":\"{{hostname}}\",\"refId\":\"A\"}],\"title\":\"Write Ops/s by Ceph Host\",\"type\":\"timeseries\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Write bytes/s, summed by Proxmox host. Peak was ~1.5–2 MB/s sustained on vmhost01 during the May 24 incident (k8s-work-02 ImageGC loop).\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":15,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false,\"stacking\":{\"group\":\"A\",\"mode\":\"none\"}},\"unit\":\"Bps\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":12,\"y\":5},\"id\":6,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"sum by(hostname) (rate(ceph_osd_op_w_in_bytes[5m]) * on(ceph_daemon) group_left(hostname) ceph_osd_metadata)\",\"legendFormat\":\"{{hostname}}\",\"refId\":\"A\"}],\"title\":\"Write Throughput by Ceph Host\",\"type\":\"timeseries\"},{\"collapsed\":false,\"gridPos\":{\"h\":1,\"w\":24,\"x\":0,\"y\":13},\"id\":7,\"title\":\"Per-OSD Breakdown\",\"type\":\"row\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Individual OSD write op rates. OSD→host mapping: vmhost01=osd.2–4,14–17,24–25; vmhost02=osd.5–13; vmhost03=osd.0–1,18–23.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":0,\"lineInterpolation\":\"linear\",\"lineWidth\":1,\"spanNulls\":false},\"unit\":\"ops\"},\"overrides\":[]},\"gridPos\":{\"h\":10,\"w\":12,\"x\":0,\"y\":14},\"id\":8,\"options\":{\"legend\":{\"calcs\":[\"lastNotNull\",\"max\"],\"displayMode\":\"table\",\"placement\":\"right\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"rate(ceph_osd_op_w[5m])\",\"legendFormat\":\"{{ceph_daemon}}\",\"refId\":\"A\"}],\"title\":\"Write Ops/s per OSD\",\"type\":\"timeseries\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Commit latency per OSD (end-to-end write durability). Elevated latency on a subset of OSDs indicates disk contention or failing hardware.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":0,\"lineInterpolation\":\"linear\",\"lineWidth\":1,\"spanNulls\":false},\"unit\":\"ms\"},\"overrides\":[]},\"gridPos\":{\"h\":10,\"w\":12,\"x\":12,\"y\":14},\"id\":9,\"options\":{\"legend\":{\"calcs\":[\"lastNotNull\",\"max\"],\"displayMode\":\"table\",\"placement\":\"right\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"ceph_osd_commit_latency_ms\",\"legendFormat\":\"{{ceph_daemon}}\",\"refId\":\"A\"}],\"title\":\"OSD Write Commit Latency\",\"type\":\"timeseries\"},{\"collapsed\":false,\"gridPos\":{\"h\":1,\"w\":24,\"x\":0,\"y\":24},\"id\":10,\"title\":\"Pool Write Breakdown\",\"type\":\"row\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Pool 2 (pveceph) = VM OS disks (RBD, 3× replication). Pool 3 (k8s) = Kubernetes PVCs. A spike in pool 2 points to VM/CT disk activity; pool 3 points to workloads writing to PVCs.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":10,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false},\"unit\":\"Bps\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":0,\"y\":25},\"id\":11,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"rate(ceph_pool_wr_bytes{pool_id=\\\"2\\\"}[5m])\",\"legendFormat\":\"pveceph (pool 2 — VM disks)\",\"refId\":\"A\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"rate(ceph_pool_wr_bytes{pool_id=\\\"3\\\"}[5m])\",\"legendFormat\":\"k8s (pool 3 — PVCs)\",\"refId\":\"B\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"rate(ceph_pool_wr_bytes{pool_id!~\\\"2|3\\\"}[5m])\",\"legendFormat\":\"pool {{pool_id}} (CephFS/other)\",\"refId\":\"C\"}],\"title\":\"Write Throughput by Pool\",\"type\":\"timeseries\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":10,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false},\"unit\":\"ops\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":12,\"y\":25},\"id\":12,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"rate(ceph_pool_wr{pool_id=\\\"2\\\"}[5m])\",\"legendFormat\":\"pveceph (pool 2 — VM disks)\",\"refId\":\"A\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"rate(ceph_pool_wr{pool_id=\\\"3\\\"}[5m])\",\"legendFormat\":\"k8s (pool 3 — PVCs)\",\"refId\":\"B\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"rate(ceph_pool_wr{pool_id!~\\\"2|3\\\"}[5m])\",\"legendFormat\":\"pool {{pool_id}} (CephFS/other)\",\"refId\":\"C\"}],\"title\":\"Write Ops/s by Pool\",\"type\":\"timeseries\"},{\"collapsed\":false,\"gridPos\":{\"h\":1,\"w\":24,\"x\":0,\"y\":33},\"id\":13,\"title\":\"VM Node Correlation (Ceph-backed)\",\"type\":\"row\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Total write bytes/s per VM across all physical Ceph-backed disks (sda, sdb, etc.). Excludes Proxmox hosts, bare metal nodes, and virtual devices (nbd/rbd/loop/dm). Some VMs have multiple data disks — this sums them. Incident baseline: k8s-work-02 at 84 KB/s; peak: 1.62 MB/s.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":10,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false},\"thresholds\":{\"mode\":\"absolute\",\"steps\":[{\"color\":\"green\",\"value\":null},{\"color\":\"yellow\",\"value\":500000},{\"color\":\"red\",\"value\":1000000}]},\"unit\":\"Bps\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":0,\"y\":34},\"id\":14,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"sum by(instance) (max by(instance, device) (rate(node_disk_written_bytes_total{instance!~\\\"vmhost.*\\\", device!~\\\"nbd.*|rbd.*|loop.*|dm-.*|mmcblk.*p[0-9]+\\\"}[5m])))\",\"legendFormat\":\"{{instance}}\",\"refId\":\"A\"}],\"title\":\"VM Disk Write Rate (All Physical Disks)\",\"type\":\"timeseries\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Root filesystem usage per VM (mountpoint=/ only). kubelet ImageGC fires at 85% on k8s nodes — keep below 75%. Other VMs: alert is a sign of runaway logs or data accumulation.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":15,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false},\"max\":1,\"min\":0,\"thresholds\":{\"mode\":\"absolute\",\"steps\":[{\"color\":\"green\",\"value\":null},{\"color\":\"yellow\",\"value\":0.75},{\"color\":\"red\",\"value\":0.85}]},\"unit\":\"percentunit\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":12,\"y\":34},\"id\":15,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"max by(instance) (1 - (node_filesystem_avail_bytes{instance!~\\\"vmhost.*\\\", mountpoint=\\\"/\\\"} / node_filesystem_size_bytes{instance!~\\\"vmhost.*\\\", mountpoint=\\\"/\\\"}))\",\"legendFormat\":\"{{instance}}\",\"refId\":\"A\"}],\"title\":\"VM Root Disk Usage %\",\"type\":\"timeseries\"},{\"collapsed\":false,\"gridPos\":{\"h\":1,\"w\":24,\"x\":0,\"y\":42},\"id\":16,\"title\":\"PVC Drill-Down\",\"type\":\"row\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Filesystem utilisation per PVC, by namespace and claim name. Use the legend table to sort by Last to find the fullest volumes. Threshold at 80% (yellow) / 90% (red). Note: write throughput per PVC is not available without Ceph CSI metrics — fill rate (next panel) is the best proxy.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":0,\"lineInterpolation\":\"smooth\",\"lineWidth\":1,\"spanNulls\":false},\"max\":1,\"min\":0,\"thresholds\":{\"mode\":\"absolute\",\"steps\":[{\"color\":\"green\",\"value\":null},{\"color\":\"yellow\",\"value\":0.8},{\"color\":\"red\",\"value\":0.9}]},\"unit\":\"percentunit\"},\"overrides\":[]},\"gridPos\":{\"h\":10,\"w\":12,\"x\":0,\"y\":43},\"id\":17,\"options\":{\"legend\":{\"calcs\":[\"lastNotNull\",\"max\"],\"displayMode\":\"table\",\"placement\":\"right\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"max by(namespace, persistentvolumeclaim) (1 - (kubelet_volume_stats_available_bytes{job=\\\"kubelet\\\"} / kubelet_volume_stats_capacity_bytes{job=\\\"kubelet\\\"}))\",\"legendFormat\":\"{{namespace}}/{{persistentvolumeclaim}}\",\"refId\":\"A\"}],\"title\":\"PVC Fill %\",\"type\":\"timeseries\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Actual write bytes/s per RBD block device per node — each rbd# corresponds to one PVC. Captures all writes including overwrites, unlike fill rate. Cross-reference with PVC Fill % (left) to identify which named PVC maps to an active device.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":0,\"lineInterpolation\":\"smooth\",\"lineWidth\":1,\"spanNulls\":false},\"unit\":\"Bps\"},\"overrides\":[]},\"gridPos\":{\"h\":10,\"w\":12,\"x\":12,\"y\":43},\"id\":18,\"options\":{\"legend\":{\"calcs\":[\"lastNotNull\",\"max\"],\"displayMode\":\"table\",\"placement\":\"right\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"max by(instance, device) (rate(node_disk_written_bytes_total{device=~\\\"rbd[0-9]+\\\", job=\\\"node-exporter\\\"}[5m]))\",\"legendFormat\":\"{{instance}} — {{device}}\",\"refId\":\"A\"}],\"title\":\"RBD Volume Write Throughput\",\"type\":\"timeseries\"},{\"collapsed\":false,\"gridPos\":{\"h\":1,\"w\":24,\"x\":0,\"y\":53},\"id\":19,\"title\":\"CSI Operations\",\"type\":\"row\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Rate of CSI gRPC calls from kubelet to each driver. NodeGetCapabilities and NodeGetVolumeStats are background health-checks; NodeStageVolume and NodePublishVolume reflect actual mount activity.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":10,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false,\"stacking\":{\"group\":\"A\",\"mode\":\"none\"}},\"unit\":\"ops\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":0,\"y\":54},\"id\":20,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"sum by(method_name, driver_name) (rate(csi_operations_seconds_count{job=\\\"kubelet\\\"}[5m]))\",\"legendFormat\":\"{{driver_name}} — {{method_name}}\",\"refId\":\"A\"}],\"title\":\"CSI Op Rate by Method & Driver\",\"type\":\"timeseries\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"Rate of CSI calls that returned a non-OK gRPC status. Spikes here indicate driver failures or Ceph connectivity issues from the kubelet's perspective.\",\"fieldConfig\":{\"defaults\":{\"color\":{\"mode\":\"palette-classic\"},\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":20,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false,\"stacking\":{\"group\":\"A\",\"mode\":\"none\"}},\"unit\":\"ops\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":12,\"x\":12,\"y\":54},\"id\":21,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"sum by(grpc_status_code, driver_name) (rate(csi_operations_seconds_count{job=\\\"kubelet\\\", grpc_status_code!=\\\"OK\\\"}[5m]))\",\"legendFormat\":\"{{driver_name}} — {{grpc_status_code}}\",\"refId\":\"A\"}],\"title\":\"CSI Error Rate\",\"type\":\"timeseries\"},{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"description\":\"99th-percentile latency for each CSI gRPC method, as observed by kubelet. High NodeStageVolume latency correlates with slow PVC attach times.\",\"fieldConfig\":{\"defaults\":{\"custom\":{\"drawStyle\":\"line\",\"fillOpacity\":10,\"lineInterpolation\":\"smooth\",\"lineWidth\":2,\"spanNulls\":false,\"stacking\":{\"group\":\"A\",\"mode\":\"none\"}},\"unit\":\"s\"},\"overrides\":[]},\"gridPos\":{\"h\":8,\"w\":24,\"x\":0,\"y\":62},\"id\":22,\"options\":{\"legend\":{\"displayMode\":\"list\",\"placement\":\"bottom\"},\"tooltip\":{\"mode\":\"multi\",\"sort\":\"desc\"}},\"targets\":[{\"datasource\":{\"type\":\"prometheus\",\"uid\":\"fe6cssq0m2v40d\"},\"expr\":\"histogram_quantile(0.99, sum by(le, method_name, driver_name) (rate(csi_operations_seconds_bucket{job=\\\"kubelet\\\"}[5m])))\",\"legendFormat\":\"{{driver_name}} — {{method_name}}\",\"refId\":\"A\"}],\"title\":\"CSI Operation Latency p99\",\"type\":\"timeseries\"}],\"refresh\":\"30s\",\"schemaVersion\":39,\"tags\":[\"ceph\",\"storage\"],\"time\":{\"from\":\"now-3h\",\"to\":\"now\"},\"timezone\":\"browser\",\"title\":\"Ceph Performance Drill-Down\",\"uid\":\"ceph-perf-drilldown\"}"
