apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-key-pepper
  namespace: homebox
spec:
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: api-key-pepper-generator
  refreshInterval: "0"
  target:
    name: api-key-pepper
