apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: book-club-database-url
  namespace: book-club
spec:
  data:
    - remoteRef:
        key: book-club-db-credentials
        property: password
      secretKey: password
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes
  target:
    name: book-club-database-url
    template:
      data:
        DATABASE_URL: postgresql://book-club:{{ .password }}@prod-pg17-pooler-rw.postgres.svc.cluster.local:5432/book-club
