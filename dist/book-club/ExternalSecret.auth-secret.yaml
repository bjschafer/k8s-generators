apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-secret
  namespace: book-club
spec:
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: book-club-auth-secret-generator
  refreshInterval: "0"
  target:
    name: auth-secret
    template:
      data:
        AUTH_SECRET: "{{ .password }}"
