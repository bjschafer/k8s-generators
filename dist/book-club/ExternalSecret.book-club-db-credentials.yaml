apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: book-club-db-credentials
  namespace: book-club
spec:
  data:
    - remoteRef:
        key: book-club-db-credentials
        property: password
      secretKey: password
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes
  target:
    name: book-club-db-credentials
