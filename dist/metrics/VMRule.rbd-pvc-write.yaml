apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  labels:
    alerts.cmdcentral.xyz/kind: metrics
  name: rbd-pvc-write
  namespace: metrics
spec:
  groups:
    - name: rbd_pvc_write
      rules:
        - expr: |-
            (
              label_replace(
                rate(node_disk_written_bytes_total{device=~"rbd[0-9]+"}[5m]),
                "full_device", "/dev/$1", "device", "(rbd[0-9]+)"
              )
            )
            * on(instance, full_device) group_left(persistentvolume)
            label_replace(
              max by(instance, device, persistentvolume) (
                label_replace(
                  node_filesystem_size_bytes{mountpoint=~".+/csi/pv/pvc-[^/]+/.+"},
                  "persistentvolume", "$1", "mountpoint", ".+/pv/(pvc-[^/]+)/.+"
                )
              ),
              "full_device", "$1", "device", "(/dev/rbd[0-9]+)"
            )
            * on(persistentvolume) group_left(namespace, persistentvolumeclaim)
            kube_persistentvolumeclaim_info
          record: rbd:pvc_write_bytes:rate5m
