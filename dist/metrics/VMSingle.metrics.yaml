apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: metrics
  namespace: metrics
spec:
  replicaCount: 1
  resources:
    limits:
      cpu: 2000m
      memory: 3Gi
    requests:
      cpu: 2000m
      memory: 3Gi
  retentionPeriod: 90d
  storage:
    resources:
      requests:
        storage: 120Gi
    storageClassName: ceph-rbd
