apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/component: syncJob
    app.kubernetes.io/instance: metrics
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-metrics-k8s-stack
    app.kubernetes.io/version: v0.0.11
    helm.sh/chart: victoria-metrics-k8s-stack-0.87.0
  name: metrics-victoria-metrics-k8s-stack-sync-job
  namespace: metrics
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: syncJob
        app.kubernetes.io/instance: metrics
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: victoria-metrics-k8s-stack
        app.kubernetes.io/version: v0.0.11
        helm.sh/chart: victoria-metrics-k8s-stack-0.87.0
    spec:
      containers:
        - env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RELEASE
              value: metrics
            - name: RESOURCE_PREFIX
              value: metrics-victoria-metrics-k8s-stack
            - name: PRUNE
              value: "true"
            - name: OWNER_REFERENCES
              value: "true"
            - name: SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
          image: ghcr.io/victoriametrics/sync-job:v0.0.11
          imagePullPolicy: IfNotPresent
          name: sync-job
          volumeMounts:
            - mountPath: /etc/config
              name: config
              readOnly: true
      restartPolicy: OnFailure
      serviceAccountName: metrics-victoria-metrics-k8s-stack-sync-job
      volumes:
        - configMap:
            name: metrics-victoria-metrics-k8s-stack-sync-job-config
          name: config
  ttlSecondsAfterFinished: 600
