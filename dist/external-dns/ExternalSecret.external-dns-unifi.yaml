apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-unifi
  namespace: external-dns
spec:
  data:
    - remoteRef:
        key: REPLACE_WITH_BITWARDEN_UUID
      secretKey: UNIFI_PASS
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: external-dns-unifi
