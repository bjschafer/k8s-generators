apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: generators
    app.kubernetes.io/name: external-dns-pdns
  name: external-dns-pdns
  namespace: external-dns
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      cdk8s.io/metadata.addr: pdns-pdns-deployment-c8340d4a
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns-pdns
        cdk8s.io/metadata.addr: pdns-pdns-deployment-c8340d4a
    spec:
      automountServiceAccountToken: true
      containers:
        - args:
            - --source=service
            - --source=ingress
            - --source=traefik-proxy
            - --interval=30s
            - --provider=pdns
            - --pdns-server=http://10.0.10.100:8081
            - --pdns-api-key=$(PDNS_API_KEY)
            - --txt-owner-id=prod-k8s-external-dns
          env:
            - name: PDNS_API_KEY
              valueFrom:
                secretKeyRef:
                  key: api-key
                  name: external-dns-pdns
          image: registry.k8s.io/external-dns/external-dns:v0.20.0
          imagePullPolicy: Always
          name: external-dns-pdns
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
      dnsPolicy: ClusterFirst
      hostNetwork: false
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: false
      serviceAccountName: external-dns
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
