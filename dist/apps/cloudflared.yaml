apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/name: cloudflared
  name: cloudflared
  namespace: argocd
spec:
  destination:
    namespace: cloudflared
    server: https://kubernetes.default.svc
  project: default
  source:
    path: dist/cloudflared
    repoURL: git@github.com:bjschafer/k8s-generators.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  labels:
    app.kubernetes.io/name: cloudflared
  name: cloudflared-updater
  namespace: argocd
spec:
  applicationRefs:
    - images:
        - alias: cloudflared
          commonUpdateSettings:
            updateStrategy: semver
          imageName: cloudflare/cloudflared:latest
      namePattern: cloudflared
  namespace: argocd
  writeBackConfig:
    gitConfig:
      branch: main
    method: git
