apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/name: external-dns
  name: external-dns
  namespace: argocd
spec:
  destination:
    namespace: external-dns
    server: https://kubernetes.default.svc
  project: default
  source:
    path: dist/external-dns
    repoURL: git@github.com:bjschafer/k8s-generators.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  labels:
    app.kubernetes.io/name: external-dns
  name: external-dns-updater
  namespace: argocd
spec:
  applicationRefs:
    - images:
        - alias: external-dns
          commonUpdateSettings:
            updateStrategy: semver
          imageName: registry.k8s.io/external-dns/external-dns:latest
        - alias: external-dns-unifi-webhook
          commonUpdateSettings:
            updateStrategy: semver
          imageName: ghcr.io/home-operations/external-dns-unifi-webhook:latest
      namePattern: external-dns
  writeBackConfig:
    gitConfig:
      branch: main
    method: git
