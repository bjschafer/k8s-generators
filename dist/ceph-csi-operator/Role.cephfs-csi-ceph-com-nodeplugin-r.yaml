apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cephfs-csi-ceph-com-nodeplugin-r
rules:
  - apiGroups:
      - csiaddons.openshift.io
    resources:
      - csiaddonsnodes
    verbs:
      - get
      - watch
      - list
      - create
      - update
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - deployments/finalizers
      - daemonsets/finalizers
    verbs:
      - update
