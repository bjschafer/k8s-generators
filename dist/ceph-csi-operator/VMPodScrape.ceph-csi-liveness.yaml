apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: ceph-csi-liveness
  namespace: ceph
spec:
  namespaceSelector:
    matchNames:
      - ceph
  podMetricsEndpoints:
    - targetPort: 9080
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - rbd.csi.ceph.com-nodeplugin
          - cephfs.csi.ceph.com-nodeplugin
