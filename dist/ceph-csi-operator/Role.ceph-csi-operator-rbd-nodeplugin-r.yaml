apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/instance: ceph-csi-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ceph-csi-operator
    app.kubernetes.io/version: v0.5.0
    helm.sh/chart: ceph-csi-operator-0.5.0
  name: ceph-csi-operator-rbd-nodeplugin-r
  namespace: ceph
rules:
  - apiGroups:
      - csiaddons.openshift.io
    resources:
      - csiaddonsnodes
    verbs:
      - get
      - watch
      - list
      - create
      - update
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - deployments/finalizers
      - daemonsets/finalizers
    verbs:
      - update
