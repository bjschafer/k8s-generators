name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: build, verify, lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Renovate only bumps the version constants; regenerating the CRDs
          # and dist/ that follow from them happens here (see the sync step at
          # the bottom of this job). That needs the branch itself rather than
          # the detached merge commit, and a PAT rather than GITHUB_TOKEN --
          # pushes made with GITHUB_TOKEN never trigger a new workflow run, so
          # Renovate would wait forever for checks on the commit we push.
          ref: ${{ startsWith(github.head_ref, 'renovate/') && github.head_ref || '' }}
          token: ${{ (startsWith(github.head_ref, 'renovate/') && secrets.RENOVATE_SYNC_TOKEN) || secrets.GITHUB_TOKEN }}

      # Installs the tools pinned in mise.toml (bun, kubectl, helm, promtool,
      # pint, alertmanager) and exports the derived [env] (KUBE_VERSION) for
      # every subsequent `mise run` invocation below.
      - name: Install mise + pinned tools
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Cache bun's package cache separately from mise's tool-install cache
      # above, keyed on the lockfile so dependency installs are fast without
      # risking a stale/incorrect result (bun install --frozen-lockfile below
      # still verifies against bun.lock regardless of cache hit).
      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: mise run install

      # A version bump in tools/sources.ts or an app-const (apps/cert-manager,
      # apps/metrics) also changes the upstream CRDs pinned to that version.
      # Refetch them before the build so dist/ is synthesized from the CRDs the
      # new version actually ships. Skips sources marked enabled: false.
      - name: Refresh upstream CRDs (Renovate PRs)
        if: ${{ startsWith(github.head_ref, 'renovate/') }}
        run: mise run update-crds --all

      # --force bypasses mise's source-based task caching: CI must always
      # regenerate dist/ from source so the git diff check below is meaningful.
      - name: Build (synth all apps into dist/)
        run: mise run --force build

      # On Renovate branches drift is expected and gets committed back below,
      # so only enforce the check everywhere else.
      - name: Verify dist/ matches committed output
        if: ${{ !startsWith(github.head_ref, 'renovate/') }}
        run: |
          if ! git diff --exit-code; then
            echo "::error::dist/ is out of sync with the TypeScript source — run 'mise run build' and commit the result."
            exit 1
          fi

      - name: Typecheck
        run: mise run typecheck

      - name: Lint
        run: mise run lint

      # Check-only: the `fmt` mise task runs oxfmt with --write, which would
      # mutate files in CI. Use --check here instead so CI only verifies.
      - name: Format check
        run: bun x oxfmt --check "**/*.ts"

      # Depends on dist/ having been built above; mise's source-based caching
      # will skip re-running the build since dist/ is already up to date.
      - name: Validate Prometheus alert rules
        run: mise run validate-alerts

      # Last step on purpose: everything above has already typechecked, linted
      # and validated this exact tree, so the commit we push is known-good. The
      # push is made with RENOVATE_SYNC_TOKEN (see checkout), which re-triggers
      # CI on the new head commit -- that run finds nothing to regenerate, goes
      # green, and Renovate automerges it.
      - name: Sync regenerated CRDs/dist back to the Renovate branch
        if: ${{ startsWith(github.head_ref, 'renovate/') }}
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if git diff --quiet; then
            echo "CRDs and dist/ already in sync; nothing to push."
            exit 0
          fi
          # Commit as github-actions[bot], which renovate.json lists under
          # gitIgnoredAuthors. Without that pairing Renovate sees a commit from
          # an author that isn't itself, marks the branch as modified by others,
          # and then refuses to automerge or rebase it.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): regenerate CRDs and dist"
          git push origin "HEAD:$HEAD_REF"
